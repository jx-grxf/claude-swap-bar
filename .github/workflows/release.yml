name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build a release artifact for (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build and package
        run: ./build-app.sh

      - name: Zip
        run: ditto -c -k --keepParent ClaudeSwapBar.app "ClaudeSwapBar-${{ steps.tag.outputs.tag }}-unsigned.zip"

      # CI has no signing certificate; this artifact is ad-hoc signed. The
      # canonical signed build is attached to the release from a dev machine.
      - name: Create release if missing and upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" "ClaudeSwapBar-$TAG-unsigned.zip" --clobber
